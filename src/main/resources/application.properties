spring.application.name=ay-khedma-backend
spring.docker.compose.enabled=false

# Server Configuration - Run on port 8080
server.port=${SERVER_PORT:8080}
server.address=0.0.0.0

# ======================
# DATABASE CONFIGURATION
# ======================
# Neon PostgreSQL (JDBC format)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP connection pool — allow long-running verification transactions
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.leak-detection-threshold=120000

# ======================
# JPA & HIBERNATION
# ======================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.database-platform=org.hibernate.spatial.dialect.postgis.PostgisDialect

#spring.jpa.properties.hibernate.dialect=org.hibernate.spatial.dialect.postgis.PostgisDialect

# ======================
# SESSION CONFIGURATION
# ======================
spring.session.jdbc.initialize-schema=always

# ======================
# JWT CONFIGURATION
# ======================
jwt.secret=${JWT_SECRET:your-secret-key-change-this-in-production-min-32-chars}
# Access token expires in 1 hour (3,600,000ms) - auto-logs out user after this time
jwt.expiration=${JWT_EXPIRATION:3600000}
# Refresh token expires in 7 days (in minutes)
jwt.refresh-expiration-minutes=${JWT_REFRESH_EXPIRATION_MINUTES:10080}

# ======================
# FILE UPLOAD CONFIGURATION
# ======================
file.upload-dir=uploads
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
spring.servlet.multipart.enabled=true
spring.servlet.multipart.file-size-threshold=2KB

# Disable security for all endpoints
spring.security.enabled=false
security.ignored=/**
security.basic.enabled=false

# Allow all requests (bypass security)
#server.error.include-message=always
#server.error.include-binding-errors=always

# Disable authentication for all endpoints
management.security.enabled=false

# ======================
# NOTIFICATION CONFIGURATION
# ======================

# ======================
# FIREBASE CONFIGURATION
# ======================
firebase.config.file=classpath:firebase-service-account.json
firebase.project-id=${FIREBASE_PROJECT_ID}
firebase.database-url=${FIREBASE_DATABASE_URL}


# WebSocket for real-time
websocket.endpoint=/ws-notifications
# temporarily allow all origins for local websocket debugging - restrict in production
websocket.allowed-origins=*

# Enable debug logging for websocket auth and messaging to troubleshoot CONNECT handling
logging.level.com.aykhedma.config.WebSocketAuthInterceptor=DEBUG
logging.level.org.springframework.web.socket=DEBUG
logging.level.org.springframework.messaging=DEBUG
logging.level.org.springframework.web.socket.sockjs=DEBUG
logging.level.org.springframework.web.socket.server=DEBUG

# Email Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_USERNAME}
spring.mail.password=${EMAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# SMS (Twilio example - you can change later)
#twilio.account-sid=${TWILIO_ACCOUNT_SID:}
#twilio.auth-token=${TWILIO_AUTH_TOKEN:}
#twilio.phone-number=${TWILIO_PHONE_NUMBER:}

# Notification settings
notification.in-app.retention-days=30
notification.batch-size=50

# Disable Redis completely
#spring.data.redis.repositories.enabled=false
#spring.redis.enabled=false
#spring.cache.type=none
#spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration,org.springframework.ai.model.vertexai.autoconfigure.gemini.VertexAiGeminiChatAutoConfiguration

spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration,org.springframework.ai.model.vertexai.autoconfigure.gemini.VertexAiGeminiChatAutoConfiguration
#spring.cache.type=redis
#spring.data.redis.host=localhost
#spring.data.redis.port=6380
#logging.level.org.springframework.cache=TRACE

spring.data.redis.url=rediss://default:gQAAAAAAAdQcAAIgcDI2MGFlYTFkYTIyZmQ0YWEyYTlmNmE1ZTc2NGRkZGZjNQ@choice-honeybee-119836.upstash.io:6379
cloudinary.cloud_name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api_key=${CLOUDINARY_API_KEY}
cloudinary.api_secret=${CLOUDINARY_API_SECRET}

# ======================
# GOOGLE MAPS CONFIGURATION
# ======================
google.maps.api.key=${GOOGLE_MAPS_API_KEY:}
# AI ASSISTANT CONFIG
# ======================
ai.gemini.api-keys=${GEMINI_API_KEYS:}
ai.gemini.base-url=${GEMINI_BASE_URL:https://generativelanguage.googleapis.com/v1beta}
ai.gemini.model=${GEMINI_MODEL:gemini-2.5-flash}
ai.gemini.use-spring-ai=${AI_USE_SPRING_AI:false}

spring.web.client.connect-timeout=10000
spring.web.client.read-timeout=120000

# Spring AI (Vertex AI Gemini) Configuration
# - Only active when AI_USE_SPRING_AI=true AND VERTEX_PROJECT_ID is set
# - When disabled, application uses custom WebClient-based Gemini integration
# - Spring AI auto-configuration will not initialize beans if project-id is empty
spring.ai.vertex.ai.gemini.project-id=${VERTEX_PROJECT_ID:}
spring.ai.vertex.ai.gemini.location=${VERTEX_LOCATION:us-central1}
spring.ai.vertex.ai.gemini.chat.options.model=${GEMINI_MODEL:gemini-2.5-flash}

# Verification Service Configuration
verification.service.url=${VERIFICATION_SERVICE_URL:http://127.0.0.1:8000}

# ======================
# MCP Configuration
# ======================
mcp.enabled=true
mcp.endpoint=/mcp
mcp.use-mcp=true
mcp.server.url=http://localhost:8081/mcp

# ======================
# Encoding Configuration
# ======================
spring.http.encoding.charset=UTF-8
spring.http.encoding.force=true
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true