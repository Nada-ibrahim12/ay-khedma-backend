# ====================================================================
# APPLICATION NAME
# ====================================================================
spring.application.name=ay-khedma-backend-test
spring.docker.compose.enabled=false

# ====================================================================
# SERVER CONFIGURATION
# ====================================================================
server.port=0
server.address=localhost

# ====================================================================
# DATABASE CONFIGURATION (H2 In-Memory for Tests)
# ====================================================================
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;INIT=CREATE SCHEMA IF NOT EXISTS public;DATABASE_TO_UPPER=false
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# ====================================================================
# JPA & HIBERNATE
# ====================================================================
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.hbm2ddl.auto=create-drop
spring.jpa.properties.hibernate.default_schema=public

# ====================================================================
# FLYWAY (DISABLED - PostgreSQL migrations incompatible with H2)
# ====================================================================
spring.flyway.enabled=false

# ====================================================================
# SESSION CONFIGURATION
# ====================================================================
spring.session.jdbc.initialize-schema=always

# ====================================================================
# JWT CONFIGURATION
# ====================================================================
jwt.secret=test-secret-key-that-is-long-enough-32bytes-for-testing!!
jwt.expiration=3600000
jwt.refresh-expiration-minutes=10080

# ====================================================================
# FILE UPLOAD CONFIGURATION
# ====================================================================
file.upload-dir=target/test-uploads
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
spring.servlet.multipart.enabled=true
spring.servlet.multipart.file-size-threshold=2KB

# ====================================================================
# SECURITY (Disable for tests)
# ====================================================================
spring.security.enabled=false
security.ignored=/**
security.basic.enabled=false
management.security.enabled=false

# ====================================================================
# EXCLUDE AUTO-CONFIGURATIONS (Fixes OAuth2 and Security issues)
# ====================================================================
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.oauth2.client.servlet.OAuth2ClientAutoConfiguration,org.springframework.boot.autoconfigure.security.oauth2.resource.servlet.OAuth2ResourceServerAutoConfiguration,org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

# ====================================================================
# DISABLE HEALTH CHECKS (Fixes mailHealthContributor error)
# ====================================================================
management.health.mail.enabled=false
management.health.defaults.enabled=false

# ====================================================================
# MAIL CONFIGURATION
# ====================================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=test-email@gmail.com
spring.mail.password=test-password-123
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ====================================================================
# CLOUDINARY CONFIGURATION
# ====================================================================
cloudinary.cloud_name=test-cloud-name
cloudinary.api_key=123456789012345
cloudinary.api_secret=test-api-secret-1234567890

# ====================================================================
# FIREBASE CONFIGURATION
# ====================================================================
firebase.config.file=classpath:firebase-service-account.json
firebase.project-id=test-firebase-project
firebase.database-url=https://test-firebase-project.firebaseio.com

# ====================================================================
# WEBSOCKET CONFIGURATION
# ====================================================================
websocket.endpoint=/ws-notifications
websocket.allowed-origins=*

# ====================================================================
# NOTIFICATION CONFIGURATION
# ====================================================================
notification.in-app.retention-days=30
notification.batch-size=50

# ====================================================================
# REDIS (Disabled for tests)
# ====================================================================
spring.data.redis.repositories.enabled=false
spring.cache.type=none

# ====================================================================
# GOOGLE MAPS CONFIGURATION
# ====================================================================
google.maps.api.key=test-google-maps-api-key

# ====================================================================
# AI / GEMINI CONFIGURATION
# ====================================================================
ai.gemini.api-keys=test-gemini-api-key
ai.gemini.base-url=https://generativelanguage.googleapis.com/v1beta
ai.gemini.model=gemini-2.5-flash
ai.gemini.use-spring-ai=false

# ====================================================================
# SPRING AI (Vertex AI Gemini)
# ====================================================================
spring.ai.vertex.ai.gemini.project-id=test-vertex-project
spring.ai.vertex.ai.gemini.location=us-central1
spring.ai.vertex.ai.gemini.chat.options.model=gemini-2.5-flash

# ====================================================================
# VERIFICATION SERVICE
# ====================================================================
verification.service.url=http://localhost:8000

# ====================================================================
# MCP CONFIGURATION
# ====================================================================
mcp.enabled=false
mcp.endpoint=/mcp
mcp.use-mcp=false
mcp.server.url=http://localhost:8081/mcp

# ====================================================================
# HTTP ENCODING
# ====================================================================
spring.http.encoding.charset=UTF-8
spring.http.encoding.force=true
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true

# ====================================================================
# LOGGING
# ====================================================================
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
logging.level.org.springframework.security=DEBUG
logging.level.com.aykhedma.config.WebSocketAuthInterceptor=DEBUG
logging.level.org.springframework.web.socket=DEBUG
logging.level.org.springframework.messaging=DEBUG
logging.level.org.springframework.web.socket.sockjs=DEBUG
logging.level.org.springframework.web.socket.server=DEBUG